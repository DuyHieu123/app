<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <title>Đăng nhập Quản trị - Việt Dân</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(120deg, #4facfe 0%, #00f2fe 100%); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #666; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #4facfe; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>QUẢN TRỊ VIÊN</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="user" placeholder="Tên tài khoản" required>
            </div>
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" id="pass" placeholder="pass" required>
            </div>
            <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
        </form>
        <a href="index.html" style="display:block; margin-top:15px; color:#888; text-decoration:none; font-size:0.8rem;">← Quay lại trang chủ</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('user').value === "admin" && document.getElementById('pass').value === "123456") {
                window.location.href = "admin_dashboard.html";
            } else {
                alert("Sai tài khoản hoặc mật khẩu!");
            }
        });
    </script>
</body>
</html>
